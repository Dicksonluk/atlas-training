      </div>
      <div style="font-size:8px;color:var(--dim);font-family:'Courier Prime',monospace">${d}</div>
    </div>`;
  }).join('');
  const latest = weights[weights.length-1];
  const first = weights[0];
  const diff = (latest-first).toFixed(1);
  const diffColor = diff<=0?'#8fa840':'#c84820';
  return `<div style="display:flex;gap:4px;align-items:flex-end">${bars}</div>
    <div style="display:flex;justify-content:space-between;margin-top:10px;font-family:'Courier Prime',monospace;font-size:11px">
      <span style="color:var(--dim)">而家：<span style="color:var(--amber);font-weight:700">${latest}kg</span></span>
      <span style="color:${diffColor}">${diff>0?'+':''}${diff}kg</span>
    </div>`;
}

// ── HISTORY LOG ───────────────────────────────────────────────
function buildHistoryLog() {
  // Collect all dates from logData keys
  const dateMap = {}; // { 'YYYY-MM-DD': { done: n, total: n, dayIdx: n } }

  Object.keys(logData).forEach(k => {
    const newFmt = k.match(/^(\d{4}-\d{2}-\d{2})_d(\d+)_s\d+_e\d+$/);
    if (newFmt) {
      const date = newFmt[1];
      const dayIdx = parseInt(newFmt[2]);
      if (!dateMap[date]) dateMap[date] = { done: 0, total: 0, dayIdx };
      dateMap[date].total++;
      if (logData[k].done) dateMap[date].done++;
    }
    // Skip old-format keys (no date prefix) — no date info available
  });

  const dates = Object.keys(dateMap).sort((a, b) => b.localeCompare(a)); // newest first

  if (!dates.length) {
    return `<div style="color:var(--dim2);font-family:'Courier Prime',monospace;font-size:12px;text-align:center;padding:16px 0">
      暫無日期記錄<br><span style="font-size:10px">開始訓練後會自動記錄</span>
    </div>`;
  }

  return dates.map(date => {
    const { done, total, dayIdx } = dateMap[date];
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    const d = new Date(date + 'T12:00:00');
    const label = d.toLocaleDateString('zh-HK', { month: 'short', day: 'numeric', weekday: 'short' });
    const dayName = DAYS[dayIdx]?.title || `Day ${dayIdx}`;
    const dayEm = DAYS[dayIdx]?.em || '';
    const isToday = date === _todayDateStr;
    const barColor = pct >= 80 ? '#8fa840' : pct >= 40 ? 'var(--amber)' : 'var(--dim2)';
    return `<div onclick="showDateDetail('${date}')"
      style="display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:6px;border-radius:2px;background:var(--bg3);border-left:3px solid ${isToday ? 'var(--amber)' : 'var(--border2)'};cursor:pointer;transition:opacity 0.15s"
      onmousedown="this.style.opacity='0.7'" onmouseup="this.style.opacity='1'" ontouchstart="this.style.opacity='0.7'" ontouchend="this.style.opacity='1'">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:baseline;gap:6px">
          <span style="font-family:'Courier Prime',monospace;font-size:11px;color:${isToday ? 'var(--amber)' : 'var(--cream2)'};letter-spacing:1px">${label}${isToday ? ' · 今日' : ''}</span>
          <span style="font-size:10px;color:var(--dim2);font-family:'Courier Prime',monospace">${dayName} ${dayEm}</span>
        </div>
        <div style="margin-top:5px;height:3px;background:var(--bg2);border-radius:2px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${barColor};border-radius:2px;transition:width 0.3s"></div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:13px;font-weight:700;color:${barColor};font-family:'Barlow Condensed',sans-serif">${pct}%</div>
        <div style="font-size:10px;color:var(--dim2);font-family:'Courier Prime',monospace">${done}/${total}</div>
      </div>
      <div style="color:var(--dim2);font-size:14px">›</div>
    </div>`;
  }).join('');
}

// ── CALENDAR ─────────────────────────────────────────────────
function shiftCal(n){
  calMonth+=n;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderProgress();
}
function buildCalendar(){
  const firstDow=new Date(calYear,calMonth,1).getDay(); // 0=Sun
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const firstMon=(firstDow+6)%7; // Mon=0
  const monthLabel=new Date(calYear,calMonth).toLocaleDateString('zh-HK',{year:'numeric',month:'long'});

  // Pre-compute logged dates for this month
  const prefix=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const loggedDates={};
  Object.keys(logData).forEach(k=>{
    const m=k.match(/^(\d{4}-\d{2}-\d{2})_/);
    if(m&&m[1].startsWith(prefix)){
      if(!loggedDates[m[1]])loggedDates[m[1]]={done:0,total:0};
      loggedDates[m[1]].total++;
      if(logData[k].done)loggedDates[m[1]].done++;
    }
  });

  const weekLabels=['一','二','三','四','五','六','日'].map(l=>
    `<div style="text-align:center;font-size:9px;color:var(--dim2);font-family:'Courier Prime',monospace;padding:3px 0">${l}</div>`
  ).join('');

  let cells='';
  for(let i=0;i<firstMon;i++) cells+=`<div></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=ds===_todayDateStr;
    const log=loggedDates[ds];
    const planned=weekPlan[ds]!==undefined;
    const pct=log?log.done/log.total:0;
    const dotC=pct>=0.8?'#8fa840':pct>=0.4?'var(--amber)':'var(--rust2)';
    cells+=`<div onclick="showDateDetail('${ds}')"
      style="text-align:center;padding:3px 1px;cursor:pointer">
      <div style="width:26px;height:26px;line-height:26px;margin:0 auto;border-radius:50%;
        background:${isToday?'var(--amber)':'transparent'};
        border:${!isToday&&log?'1px solid var(--border2)':planned&&!log?'1px dashed var(--border)':'none'};
        font-size:12px;font-family:'Barlow Condensed',sans-serif;
        color:${isToday?'var(--bg)':log?'var(--cream)':'var(--dim2)'}">
        ${day}
      </div>
      ${log?`<div style="width:5px;height:5px;border-radius:50%;background:${dotC};margin:1px auto 0"></div>`:'<div style="height:6px"></div>'}
    </div>`;
  }

  return `<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button onclick="shiftCal(-1)" style="background:none;border:1px solid var(--border2);color:var(--amber);padding:4px 12px;font-family:'Courier Prime',monospace;cursor:pointer;border-radius:2px">←</button>
      <div style="font-family:'Courier Prime',monospace;font-size:12px;color:var(--cream);letter-spacing:1px">${monthLabel}</div>
      <button onclick="shiftCal(1)" style="background:none;border:1px solid var(--border2);color:var(--amber);padding:4px 12px;font-family:'Courier Prime',monospace;cursor:pointer;border-radius:2px">→</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">${weekLabels}${cells}</div>
    <div style="display:flex;gap:12px;margin-top:8px;font-family:'Courier Prime',monospace;font-size:9px;color:var(--dim2)">
      <span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#8fa840;margin-right:3px;vertical-align:middle"></span>≥80%</span>
      <span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-right:3px;vertical-align:middle"></span>部分</span>
      <span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--rust2);margin-right:3px;vertical-align:middle"></span>少量</span>
      <span><span style="display:inline-block;width:12px;height:1px;border-top:1px dashed var(--border);margin-right:3px;vertical-align:middle;display:inline-block"></span>計劃中</span>
    </div>
  </div>`;
}

// ── WEEKLY PLANNER ────────────────────────────────────────────
function buildWeekPlanner(){
  // Get Mon of current week
  const today=new Date(_todayDateStr+'T12:00:00');
  const dow=today.getDay();
  const mondayOffset=dow===0?-6:1-dow;
  const monday=new Date(today);
  monday.setDate(today.getDate()+mondayOffset);

  const weekDays=[];
  for(let i=0;i<7;i++){
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    weekDays.push(localDateStr(d));
  }
  const dayLabels=['週一','週二','週三','週四','週五','週六','週日'];
  const opts=[
    `<option value="-1">— 休息 —</option>`,
    ...DAYS.map((d,i)=>`<option value="${i}">${d.title} ${d.em} (${d.label})</option>`)
  ].join('');

  const rows=weekDays.map((ds,wi)=>{
    const cur=getDayForDate(ds);
    const isToday=ds===_todayDateStr;
    const d=new Date(ds+'T12:00:00');
    const log=Object.keys(logData).some(k=>k.startsWith(ds+'_')&&logData[k].done);
    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);${isToday?'background:rgba(232,160,48,0.05);margin:0 -16px;padding:8px 16px':''}">
      <div style="width:40px;flex-shrink:0;text-align:center">
        <div style="font-size:9px;color:${isToday?'var(--amber)':'var(--dim2)'};font-family:'Courier Prime',monospace">${dayLabels[wi]}</div>
        <div style="font-size:16px;font-weight:700;color:${isToday?'var(--amber)':'var(--cream2)'};font-family:'Barlow Condensed',sans-serif">${d.getDate()}</div>
        ${log?`<div style="font-size:8px;color:#8fa840;font-family:'Courier Prime',monospace">✓完成</div>`:''}
      </div>
      <select onchange="setWeekDay('${ds}',parseInt(this.value))"
        style="flex:1;background:var(--bg3);border:1px solid ${isToday?'var(--amber)':'var(--border2)'};color:var(--cream);font-family:'Courier Prime',monospace;font-size:11px;padding:7px 8px;outline:none;border-radius:2px;cursor:pointer">
        ${opts.replace(`value="${cur}"`,`value="${cur}" selected`)}
      </select>
    </div>`;
  }).join('');

  return `<div>${rows}
    <div style="margin-top:10px;font-size:10px;color:var(--dim2);font-family:'Courier Prime',monospace">// 改完之後去TRAIN嗰日會自動跟此計劃，唔再強制跟星期</div>
  </div>`;
}

function setWeekDay(dateStr,dayIdx){
  if(dayIdx===-1) delete weekPlan[dateStr];
  else weekPlan[dateStr]=dayIdx;
  saveWeekPlan();
  if(activeLogDate===dateStr){ activeDay=dayIdx>=0?dayIdx:getDayForDate(dateStr); if(currentPage==='train') renderTrain(); }
  renderProgress();
}

// ── PROGRESS ─────────────────────────────────────────────────
function renderProgress() {
  const totalEx=DAYS.reduce((a,d)=>a+d.sections.reduce((b,s)=>b+s.exercises.length,0),0);
  const doneEx=Object.values(logData).filter(v=>v.done).length;
  // Count unique training dates (new format) + old format day-groups
  const dateDays=new Set(Object.keys(logData).filter(k=>/^\d{4}-\d{2}-\d{2}_/.test(k)).map(k=>k.split('_')[0]));
  const oldDays=new Set(Object.keys(logData).filter(k=>/^d\d+s/.test(k)).map(k=>k.match(/^(d\d+)/)[1]));
  const daysDone=dateDays.size+oldDays.size;

  const bars=['M','T','W','T','F','S','S'].map((lbl,i)=>{
    const dt=DAYS[i]?.sections?.reduce((a,s)=>a+s.exercises.length,0)||1;
    // Count done from both new and old key formats for this day index
    const dd=Object.keys(logData).filter(k=>(k.match(/_d(\d+)_/)?.[1]==String(i)||k.startsWith(`d${i}s`))&&logData[k].done).length;
    const p=Math.min(dd/dt*100,100);
    return `<div class="wbar"><div class="wbar-wrap"><div class="wbar-fill" style="height:${p}%"></div></div><div class="wbar-lbl">${lbl}</div></div>`;
  }).join('');

  document.getElementById('page-progress').innerHTML=`<div class="prog-body">
    <div class="prog-hdr">
      <div class="deco-line"><span>TRAINING LOG</span></div>
      <div class="prog-title">進度<br><em>追蹤</em></div>
    </div>
    <div class="stats-grid">
      <div class="stat-card card-fly" style="animation-delay:0.05s"><div class="stat-icon" style="background:rgba(143,168,64,0.15);color:#8fa840"><svg viewBox="0 0 16 16" width="16" height="16"><path d="M3 8 L6 11 L13 4" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="stat-val">${doneEx}</div><div class="stat-lbl">動作完成</div></div>
      <div class="stat-card card-fly" style="animation-delay:0.1s"><div class="stat-icon" style="background:rgba(96,144,224,0.15);color:#6090e0"><svg viewBox="0 0 16 16" width="16" height="16"><rect x="2" y="3" width="12" height="11" rx="1" stroke="currentColor" fill="none" stroke-width="1.5"/><line x1="2" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="1" x2="5" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="11" y1="1" x2="11" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div><div class="stat-val">${daysDone}</div><div class="stat-lbl">訓練日數</div></div>
      <div class="stat-card card-fly" style="animation-delay:0.15s"><div class="stat-icon" style="background:rgba(232,160,48,0.15);color:var(--amber)"><svg viewBox="0 0 16 16" width="16" height="16"><circle cx="8" cy="8" r="6" stroke="currentColor" fill="none" stroke-width="1.5"/><path d="M8 8 L8 2 A6 6 0 0 1 14 8 Z" fill="currentColor" opacity="0.7"/></svg></div><div class="stat-val">${Math.round(doneEx/totalEx*100)||0}%</div><div class="stat-lbl">整體完成率</div></div>
      <div class="stat-card card-fly" style="animation-delay:0.2s"><div class="stat-icon" style="background:rgba(200,72,32,0.15);color:var(--rust2)"><svg viewBox="0 0 16 16" width="16" height="16"><line x1="4" y1="2" x2="4" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4 2 L13 5 L4 9 Z" fill="currentColor"/></svg></div><div class="stat-val">P.1</div><div class="stat-lbl">當前階段</div></div>
    </div>
    <div class="week-grid">${bars}</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:16px;margin-bottom:16px">
      <div style="font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:3px;color:var(--amber);margin-bottom:12px">// 月曆 · 訓練記錄</div>
      ${buildCalendar()}
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:16px;margin-bottom:16px">
      <div style="font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:3px;color:var(--amber);margin-bottom:12px">// 訓練歷史記錄</div>
      ${buildHistoryLog()}
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:16px;margin-bottom:16px">
      <div style="font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:3px;color:var(--amber);margin-bottom:12px">// 體重記錄</div>
      ${buildWeightChart()}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="loadFromSheets()" style="flex:1;background:transparent;border:1px solid var(--border2);padding:8px;font-family:'Courier Prime',monospace;font-size:11px;color:var(--dim);cursor:pointer;letter-spacing:1px">⬇ 從Sheets合併同步</button>
        <button onclick="syncToSheets()" style="flex:1;background:var(--amber);border:none;padding:8px;font-family:'Courier Prime',monospace;font-size:11px;color:var(--bg);font-weight:700;cursor:pointer;letter-spacing:1px">☁ 立即同步</button>
      </div>
      <div style="font-size:10px;color:var(--dim2);font-family:'Courier Prime',monospace;margin-top:8px;text-align:center">
        上次同步：${localStorage.getItem('atlas_last_sync')||'未曾同步'}
      </div>
    </div>
    <div class="phase-card card-fly">
      <div class="phase-tag">// 當前階段 · PHASE ONE</div>
      <div class="phase-title">基礎重建</div>
      <div class="phase-desc">Wk 1–4：重建動作模式、腰背穩定性、爆發力神經系統基礎。動作質素優先於重量。</div>
      <div class="phase-bar-labels"><span>開始</span><span>Week 4</span></div>
      <div class="phase-bar"><div class="phase-fill" style="width:25%"></div></div>
    </div>
    <div class="phase-card card-fly" style="animation-delay:0.1s;opacity:0.6">
      <div class="phase-tag">// 下一階段 · PHASE TWO</div>
      <div class="phase-title">強度提升</div>
      <div class="phase-desc">Wk 5–8：漸進超負荷，爆發力Plyometric升級，手臂專項加強。</div>
    </div>
    <div class="phase-card card-fly" style="animation-delay:0.15s;opacity:0.4">
      <div class="phase-tag">// 最終階段 · PHASE THREE</div>
      <div class="phase-title">峰值表現</div>
      <div class="phase-desc">Wk 9–12：運動專項整合，最大爆發力，排球進攻模擬訓練。</div>
    </div>
  </div>`;
}

// ── INIT ──────────────────────────────────────────────────────
initThemeBtn();
ui.trainSelector=true;
showPage('train');
</script>
</body>
</html>
