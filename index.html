<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ATLAS вҖ” Training System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow+Condensed:wght@300;400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1108;
  --bg2: #231809;
  --bg3: #2e200d;
  --border: #4a3520;
  --border2: #6b4e2a;
  --cream: #f2e8d0;
  --cream2: #f0e4c4;
  --amber: #e8a030;
  --amber2: #f0b840;
  --rust: #c84820;
  --rust2: #e05828;
  --gold: #d4900a;
  --gold2: #f0a820;
  --olive: #6b7a30;
  --warm-white: #faf4e8;
  --dim: #b09070;
  --dim2: #907858;
  --nav-h: 68px;
  --top-h: 60px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Barlow Condensed', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* GRAIN OVERLAY */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 1000;
  pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  animation: grainShift 0.5s steps(1) infinite;
}
@keyframes grainShift {
  0%,100% { background-position: 0 0; }
  20% { background-position: -30px -20px; }
  40% { background-position: 20px -40px; }
  60% { background-position: -10px 30px; }
  80% { background-position: 40px 10px; }
}

/* SCANLINES */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 999;
  pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

/* TOPBAR */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--top-h);
  background: var(--bg2);
  border-bottom: 2px solid var(--amber);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.topbar::after {
  content: '';
  position: absolute; bottom: -5px; left: 0; right: 0;
  height: 2px; background: var(--rust);
  opacity: 0.5;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 900;
  letter-spacing: 6px; color: var(--amber);
  text-shadow: 2px 2px 0 var(--rust), 4px 4px 0 rgba(0,0,0,0.3);
}
.logo em { color: var(--cream); font-style: italic; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.backup-btn {
  background: transparent; border: 1px solid var(--amber);
  border-radius: 2px; padding: 5px 10px;
  color: var(--amber); font-size: 10px;
  font-family: 'Courier Prime', monospace;
  letter-spacing: 1px; cursor: pointer;
  transition: all 0.15s;
}
.backup-btn:active { background: var(--amber); color: var(--bg); transform: scale(0.97); }
.topbar-info { font-family: 'Courier Prime', monospace; font-size: 9px; color: var(--dim); text-align: right; line-height: 1.5; }

/* NAV */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  height: var(--nav-h);
  background: var(--bg2);
  border-top: 2px solid var(--amber);
  display: flex;
}
.nav::before {
  content: '';
  position: absolute; top: -5px; left: 0; right: 0;
  height: 2px; background: var(--rust); opacity: 0.5;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  cursor: pointer; color: var(--dim);
  font-family: 'Courier Prime', monospace;
  font-size: 9px; letter-spacing: 2px;
  border: none; background: transparent;
  transition: all 0.2s; position: relative;
}
.nav-item.active { color: var(--amber); }
.nav-item.active::before {
  content: '';
  position: absolute; top: 0; left: 20%; right: 20%;
  height: 2px; background: var(--amber);
}
.nav-icon { font-size: 22px; line-height: 1; }

/* PAGES */
.page {
  display: none;
  padding-top: var(--top-h);
  padding-bottom: calc(var(--nav-h) + 16px);
  min-height: 100vh;
}
.page.active { display: block; }

/* PAGE TRANSITIONS */
.page-enter { animation: slideInUp 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
.page-exit { animation: slideOutDown 0.25s ease-in forwards; }
@keyframes slideInUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideOutDown { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-20px); } }

/* CARD FLY IN */
.card-fly { opacity:0; transform:translateY(20px); animation: flyIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes flyIn { to { opacity:1; transform:translateY(0); } }

/* DECORATIVE ELEMENTS */
.deco-line {
  display: flex; align-items: center; gap: 12px;
  margin: 0 0 4px;
}
.deco-line::before, .deco-line::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--amber), transparent);
}
.deco-line span {
  font-family: 'Courier Prime', monospace;
  font-size: 9px; color: var(--amber); letter-spacing: 3px;
}

/* в”Җв”Җ AI SETUP BANNER в”Җв”Җ */
.ai-banner {
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  border: 1px solid var(--border2);
  border-left: 3px solid var(--amber);
  border-radius: 4px; padding: 14px 16px; margin: 16px 20px;
  cursor: pointer; transition: all 0.2s;
}
.ai-banner:active { transform: scale(0.98); }
.ai-banner-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--amber); margin-bottom: 4px; }
.ai-banner-sub { font-size: 12px; color: var(--dim); font-family: 'Courier Prime', monospace; }
.ai-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--rust); margin-right: 6px; animation: pulse 2s infinite; }
.ai-status.on { background: var(--olive); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* в”Җв”Җ CHECKIN в”Җв”Җ */
.ci-hero {
  background: linear-gradient(160deg, #2a1a08 0%, #1a1108 100%);
  border-bottom: 2px solid var(--amber);
  padding: 28px 20px 24px;
  position: relative; overflow: hidden;
}
.ci-hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 50%, rgba(232,160,48,0.08) 0%, transparent 70%);
}
.ci-year {
  font-family: 'Playfair Display', serif;
  font-size: 100px; font-weight: 900;
  color: rgba(232,160,48,0.06);
  position: absolute; right: -10px; top: -10px;
  line-height: 1; letter-spacing: -4px;
  pointer-events: none;
}
.ci-tag { font-family: 'Courier Prime', monospace; font-size: 10px; color: var(--amber); letter-spacing: 3px; margin-bottom: 8px; }
.ci-title {
  font-family: 'Playfair Display', serif;
  font-size: 32px; font-weight: 900; line-height: 1.1;
  color: var(--cream); margin-bottom: 6px;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
}
.ci-title em { color: var(--amber); font-style: italic; }
.ci-sub { font-size: 13px; color: var(--dim); letter-spacing: 0.5px; }

.ci-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }

.ci-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px; padding: 16px;
  position: relative; overflow: hidden;
}
.ci-card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--amber);
}
.ci-label {
  font-family: 'Courier Prime', monospace;
  font-size: 9px; letter-spacing: 3px;
  color: var(--amber); margin-bottom: 10px;
}
.ci-q { font-size: 17px; font-weight: 700; margin-bottom: 14px; color: var(--cream2); letter-spacing: 0.5px; }

.slider-row { display: flex; align-items: center; gap: 14px; }
.slider-val {
  font-family: 'Playfair Display', serif;
  font-size: 40px; font-weight: 900;
  color: var(--amber); min-width: 44px; line-height: 1;
  text-shadow: 2px 2px 0 var(--rust);
}
input[type=range] {
  flex: 1; -webkit-appearance: none;
  height: 3px; background: var(--border2);
  border-radius: 0; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px;
  background: var(--amber); cursor: pointer;
  clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
}
.slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--dim); margin-top: 8px; font-family: 'Courier Prime', monospace; letter-spacing: 1px; }

.chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
  padding: 7px 14px; border-radius: 2px;
  border: 1px solid var(--border2);
  font-size: 12px; cursor: pointer;
  transition: all 0.15s; color: var(--dim);
  background: transparent;
  font-family: 'Courier Prime', monospace;
  letter-spacing: 1px;
}
.chip:active { transform: scale(0.95); }
.chip.sel { background: var(--amber); border-color: var(--amber); color: var(--bg); font-weight: 700; }

.tog-row { display: flex; gap: 8px; }
.tog {
  flex: 1; padding: 10px; border-radius: 2px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--dim); font-size: 12px; cursor: pointer;
  transition: all 0.2s; letter-spacing: 1px;
  font-family: 'Courier Prime', monospace;
}
.tog:active { transform: scale(0.97); }
.tog.on { background: rgba(232,160,48,0.12); border-color: var(--amber); color: var(--amber); }
.tog.warn { background: rgba(200,72,32,0.12); border-color: var(--rust); color: var(--rust2); }

.gen-btn {
  background: var(--amber);
  color: var(--bg); border: none;
  border-radius: 2px; padding: 18px;
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700;
  letter-spacing: 3px; cursor: pointer; width: 100%;
  transition: all 0.2s;
  box-shadow: 4px 4px 0 var(--rust);
  position: relative;
}
.gen-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--rust); }

/* REC CARD */
.rec-card {
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  border: 1px solid var(--amber);
  border-radius: 4px; padding: 20px;
  margin-top: 16px;
  box-shadow: 4px 4px 0 rgba(232,160,48,0.2);
}
.rec-label { font-family: 'Courier Prime', monospace; font-size: 9px; letter-spacing: 3px; color: var(--amber); margin-bottom: 8px; }
.rec-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; margin-bottom: 4px; color: var(--cream); }
.rec-sub { font-size: 12px; color: var(--dim); margin-bottom: 16px; font-family: 'Courier Prime', monospace; }
.rec-mods { display: flex; flex-direction: column; gap: 8px; }
.rec-mod {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 2px;
  background: rgba(0,0,0,0.3);
  border-left: 2px solid var(--amber);
  animation: flyIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
}
.rec-mod-name { font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }
.rec-mod-sets { font-size: 11px; color: var(--dim); font-family: 'Courier Prime', monospace; }
.rec-note {
  margin-top: 14px; padding: 12px 14px;
  background: rgba(200,72,32,0.1);
  border-left: 2px solid var(--rust);
  font-size: 12px; color: var(--cream2); line-height: 1.7;
  font-family: 'Courier Prime', monospace;
}

/* в”Җв”Җ AI CHAT в”Җв”Җ */
.ai-page { padding: 16px 20px; }
.ai-header { margin-bottom: 16px; }
.plan-checkin { background: var(--bg2); border: 1px solid var(--border2); border-radius: 4px; padding: 16px; margin-bottom: 12px; }
.plan-row { margin-bottom: 14px; }
.plan-row:last-child { margin-bottom: 0; }
.plan-row-label { font-family: 'Courier Prime', monospace; font-size: 10px; letter-spacing: 2px; color: var(--amber); margin-bottom: 8px; }
.plan-chat { background: var(--bg2); border: 1px solid var(--border2); border-radius: 4px; padding: 16px; margin-top: 16px; }
.plan-out-text { font-size: 13px; line-height: 1.8; color: var(--cream); white-space: pre-wrap; }
/* AI Plan in TRAIN page */
.ai-plan-banner { background:linear-gradient(135deg,rgba(232,160,48,0.12),rgba(200,72,32,0.08)); border:1px solid var(--amber); border-radius:4px; padding:14px 16px; margin-bottom:16px; }
.ai-plan-banner-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.ai-plan-banner-title { font-family:'Playfair Display',serif; font-size:16px; font-weight:900; color:var(--amber); }
/* Check-in inline plan editor */
.ci-ex-item { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:2px; background:var(--bg3); border-left:3px solid var(--amber); margin-bottom:6px; cursor:pointer; transition:opacity 0.2s; }
.ci-ex-item.ci-ex-off { opacity:0.35; border-left-color:var(--dim2); }
.ci-ex-chk { width:22px; height:22px; border-radius:2px; border:1px solid var(--amber); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--amber); flex-shrink:0; margin-top:2px; }
.ci-ex-off .ci-ex-chk { border-color:var(--dim2); color:var(--dim2); }
.ai-plan-ex { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:2px; background:rgba(0,0,0,0.25); border-left:3px solid var(--amber); margin-bottom:6px; transition:opacity 0.2s; }
.ai-plan-ex.done { border-left-color:var(--olive); opacity:0.55; }
.ai-plan-ex-body { flex:1; min-width:0; }
.ai-plan-ex-name { font-weight:700; font-size:13px; color:var(--cream); }
.ai-plan-ex-sets { font-family:'Courier Prime',monospace; font-size:11px; color:var(--amber); margin-top:1px; }
.ai-plan-ex-note { font-size:11px; color:var(--dim); margin-top:1px; }
.ai-plan-log-btn { font-family:'Courier Prime',monospace; font-size:10px; letter-spacing:1px; padding:5px 10px; border-radius:2px; cursor:pointer; border:1px solid var(--border2); background:transparent; color:var(--dim); white-space:nowrap; transition:all 0.15s; }
.ai-plan-log-btn.done { background:var(--olive); border-color:var(--olive); color:#fff; }
.ai-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: var(--amber); text-shadow: 2px 2px 0 var(--rust); margin-bottom: 4px; }
.ai-sub { font-size: 12px; color: var(--dim); font-family: 'Courier Prime', monospace; }

.api-setup {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 4px; padding: 16px; margin-bottom: 16px;
}
.api-setup-label { font-family: 'Courier Prime', monospace; font-size: 9px; letter-spacing: 3px; color: var(--amber); margin-bottom: 8px; }
.api-setup-desc { font-size: 12px; color: var(--dim); margin-bottom: 12px; line-height: 1.6; font-family: 'Courier Prime', monospace; }
.api-input-wrap { display: flex; gap: 8px; }
.api-input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 2px; padding: 10px 12px;
  color: var(--cream); font-family: 'Courier Prime', monospace;
  font-size: 12px; outline: none;
}
.api-input::placeholder { color: var(--dim2); }
.api-save-btn {
  background: var(--amber); border: none; border-radius: 2px;
  padding: 10px 16px; color: var(--bg);
  font-family: 'Courier Prime', monospace; font-size: 11px;
  font-weight: 700; cursor: pointer; letter-spacing: 1px;
  transition: all 0.15s; white-space: nowrap;
}
.api-save-btn:active { transform: scale(0.97); }

.chat-msgs {
  display: flex; flex-direction: column; gap: 12px;
  margin-bottom: 16px; min-height: 200px;
}
.msg {
  max-width: 88%; padding: 12px 14px;
  border-radius: 2px; font-size: 13px; line-height: 1.7;
  animation: flyIn 0.3s ease both;
}
.msg-ai {
  background: var(--bg2); border: 1px solid var(--border2);
  border-left: 3px solid var(--amber);
  color: var(--cream2); align-self: flex-start;
  font-family: 'Courier Prime', monospace;
}
.msg-ai strong { color: var(--amber); font-size: 9px; letter-spacing: 2px; display: block; margin-bottom: 6px; }
.msg-user {
  background: rgba(232,160,48,0.12); border: 1px solid rgba(232,160,48,0.3);
  color: var(--cream); align-self: flex-end;
}
.msg-typing { display: flex; gap: 4px; align-items: center; padding: 14px; }
.dot { width: 6px; height: 6px; background: var(--amber); border-radius: 50%; animation: typingDot 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingDot { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

.chat-input-row { display: flex; gap: 8px; }
.chat-input {
  flex: 1; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 2px; padding: 12px 14px;
  color: var(--cream); font-family: 'Courier Prime', monospace;
  font-size: 13px; outline: none; resize: none;
}
.chat-input::placeholder { color: var(--dim2); }
.chat-send {
  background: var(--amber); border: none; border-radius: 2px;
  padding: 12px 16px; color: var(--bg);
  font-family: 'Playfair Display', serif;
  font-size: 18px; cursor: pointer;
  transition: all 0.15s; box-shadow: 2px 2px 0 var(--rust);
}
.chat-send:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--rust); }

.quick-prompts { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.qp {
  padding: 6px 12px; border-radius: 2px;
  border: 1px solid var(--border2);
  font-size: 11px; color: var(--dim);
  cursor: pointer; font-family: 'Courier Prime', monospace;
  letter-spacing: 0.5px; transition: all 0.15s;
  background: transparent;
}
.qp:active { border-color: var(--amber); color: var(--amber); transform: scale(0.97); }

/* в”Җв”Җ TRAIN в”Җв”Җ */
.strip-wrap { padding: 16px 20px 0; overflow-x: auto; }
.day-strip { display: flex; gap: 6px; padding-bottom: 4px; }
.day-strip::-webkit-scrollbar { display: none; }
.day-pill {
  flex-shrink: 0; cursor: pointer;
  border: 1px solid var(--border); padding: 8px 14px;
  text-align: center; transition: all 0.2s;
  border-radius: 2px;
}
.day-pill:active { transform: scale(0.95); }
.dp-l { font-family: 'Courier Prime', monospace; font-size: 8px; color: var(--dim2); letter-spacing: 1px; margin-bottom: 2px; }
.dp-n { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: var(--dim); letter-spacing: 2px; }
.day-pill.active { background: var(--amber); border-color: var(--amber); box-shadow: 2px 2px 0 var(--rust); }
.day-pill.active .dp-l, .day-pill.active .dp-n { color: var(--bg); }
.day-pill.sport { border-color: var(--rust); }
.day-pill.sport .dp-n { color: var(--rust2); }

.train-body { padding: 20px; }
.masthead { padding-bottom: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.masthead-tag { font-family: 'Courier Prime', monospace; font-size: 9px; letter-spacing: 3px; color: var(--amber); margin-bottom: 10px; }
.masthead-title {
  font-family: 'Playfair Display', serif;
  font-size: 40px; font-weight: 900; line-height: 1;
  color: var(--cream); letter-spacing: -1px; margin-bottom: 4px;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
}
.masthead-title em { color: var(--amber); font-style: italic; }
.masthead-sub { font-size: 13px; color: var(--dim); letter-spacing: 1px; }

/* PROGRESS RING */
.ring-wrap {
  display: flex; align-items: center; gap: 16px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 4px; padding: 14px 16px; margin-bottom: 18px;
}
.ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
.ring-fill { fill: none; stroke: var(--amber); stroke-width: 4; stroke-linecap: square; transition: stroke-dashoffset 0.8s cubic-bezier(0.16,1,0.3,1); transform: rotate(-90deg); transform-origin: 50% 50%; }
.ring-t1 { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 900; fill: var(--amber); text-anchor: middle; dominant-baseline: middle; }
.ring-t2 { font-family: 'Courier Prime', monospace; font-size: 7px; fill: var(--dim); text-anchor: middle; dominant-baseline: middle; }
.ring-info-t { font-weight: 700; font-size: 15px; margin-bottom: 2px; color: var(--cream2); }
.ring-info-s { font-size: 11px; color: var(--dim); font-family: 'Courier Prime', monospace; }

.wu-strip {
  background: linear-gradient(135deg, #0d1a0d, #0a0a0a);
  border: 1px solid rgba(107,122,48,0.4);
  border-radius: 4px; padding: 14px 16px; margin-bottom: 16px;

// Google Sheets sync
let syncStatus = 'idle';
async function syncToSheets(silent=false) {
  if (syncStatus==='syncing') return;
  syncStatus='syncing'; updateSyncBtn();
  try {
    await fetch(SHEETS_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'save', log: {...logData, _weight: weightData} })
    });
    syncStatus='success';
    localStorage.setItem('atlas_last_sync', new Date().toLocaleString('zh-HK'));
    if(!silent) toast('вң“ е·ІеҗҢжӯҘеҺ»Google SheetsпјҒ');
  } catch(e) {
    syncStatus='error';
    if(!silent) toast('вҡ  еҗҢжӯҘеӨұж•—пјҢиЁҳйҢ„е·Іжң¬ең°е„Іеӯҳ');
  }
  updateSyncBtn();
  setTimeout(()=>{ syncStatus='idle'; updateSyncBtn(); }, 3000);
}
async function loadFromSheets() {
  toast('\u8f09\u5165\u4e2d...');
  try {
    const res = await fetch(SHEETS_URL+'?action=load');
    const data = await res.json();
    if (data.success && data.log) {
      const {_weight, ...trainLog} = data.log;
      logData=trainLog; if(_weight) weightData=_weight;
      saveLog(); saveWeightData();
      toast('\u2713 \u5df2\u5f9eGoogle Sheets\u6062\u5fa9\u8a18\u9304\uff01');
      if(currentPage==='train') renderDayContent();
      if(currentPage==='progress') renderProgress();
    }
  } catch(e) { toast('\u26a0 \u8f09\u5165\u5931\u6557'); }
}
function updateSyncBtn() {
  const btn=document.getElementById('syncBtn');
  if(!btn) return;
  const states={syncing:'\u27f3 \u540c\u6b65\u4e2d...',success:'\u2713 \u5df2\u540c\u6b65',error:'\u26a0 \u5931\u6557',idle:'\u2601 \u540c\u6b65'};
  btn.textContent=states[syncStatus]||'\u2601 \u540c\u6b65';
  btn.style.opacity=syncStatus==='syncing'?'0.6':'1';
}

function saveLog() {
  try { localStorage.setItem(LOG_KEY, JSON.stringify(logData)); } catch(e){}
  // Auto-sync to Google Sheets (debounced, silent)
  clearTimeout(window._autoSyncTimer);
  window._autoSyncTimer=setTimeout(()=>{ if(syncStatus==='idle') syncToSheets(true); },3000);
}
function ek(d,s,e) { return `d${d}s${s}e${e}`; }
function toast(m) {
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function exportLog() {
  const str=JSON.stringify(logData);
  const enc=btoa(unescape(encodeURIComponent(str)));
  navigator.clipboard?.writeText(enc).then(()=>{ toast('вң“ еӮҷд»Ҫзўје·ІиӨҮиЈҪпјҒ'); closeBackup(); })
  .catch(()=>{ document.getElementById('importTxt').value=enc; toast('и«ӢжүӢеӢ•иӨҮиЈҪдёҠж–№еӮҷд»Ҫзўј'); });
}
function importLog() {
  const txt=document.getElementById('importTxt').value.trim();
  if(!txt){toast('и«Ӣе…ҲиІје…ҘеӮҷд»Ҫзўј');return;}
  try {
    const dec=decodeURIComponent(escape(atob(txt)));
    logData=JSON.parse(dec); saveLog();
    toast('вң“ иЁҳйҢ„жҒўеҫ©жҲҗеҠҹпјҒ'); closeBackup();
    if(currentPage==='train') renderDayContent();
    if(currentPage==='progress') renderProgress();
  } catch(e){ toast('вҡ  еӮҷд»Ҫзўјж јејҸйҢҜиӘӨ'); }
}

  const today = new Date().toISOString().split('T')[0];

function saveWeightFromInput() {

  if (w) {

    weightData[today] = { weight: parseFloat(w), ts: Date.now() };

}

  saveWeightFromInput();

  const energy=parseInt(document.getElementById('eVal').textContent);

  const energyLabel=energy<=3?'еҘҪдҪҺ':energy<=5?'дёҖиҲ¬':energy<=7?'дёҚйҢҜ':'еҘҪй«ҳ';
  const timeLabel=t<=30?'30еҲҶйҗҳд»Ҙе…§':t<=45?'зҙ„45еҲҶйҗҳ':t<=60?'зҙ„1е°ҸжҷӮ':'90еҲҶйҗҳд»ҘдёҠ';
  const checkinMsg=`гҖҗд»Ҡж—ҘCheck-in вҖ” ${day.name} ${day.title}гҖ‘зІҫеҠӣпјҡ${energy}/10пјҲ${energyLabel}пјүгҖҒжҷӮй–“пјҡ${timeLabel}гҖҒд»ҠйҖұжү“жіўпјҡ${s}ж—ҘгҖҒзӢҖж…Ӣпјҡ${sore?'вҡ жңүдёҚйҒ©':'вң“жӯЈеёё'}${notes?`гҖҒеӮҷжіЁпјҡ${notes}`:''}гҖӮи«Ӣж №ж“ҡе‘ўеҖӢзӢҖж…ӢеҗҢиҝ‘жңҹиЁ“з·ҙиЁҳйҢ„пјҢзӣҙжҺҘжҸҗеҮәд»Ҡж—Ҙе…·й«”иЁ“з·ҙиЁҲеҠғпјҲеӢ•дҪңгҖҒзө„ж•ёгҖҒжҸҗзӨәпјүпјҢе””йңҖиҰҒе•ҸеӨҡйӨҳе•ҸйЎҢгҖӮ`;
  const out=document.getElementById('ciPlanOut');
  out.innerHTML=`<div class="ci-card" style="text-align:center;padding:20px"><div class="msg-typing" style="display:inline-flex;gap:4px"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div style="margin-top:10px;font-family:'Courier Prime',monospace;font-size:11px;color:var(--dim)">AIеҲҶжһҗз·Ҡ...</div></div>`;
  out.scrollIntoView({behavior:'smooth'});
  try{

    chatHistory=[{role:'user',content:checkinMsg},{role:'assistant',content:reply}];
    const match=reply.match(/\[PLAN\]([\s\S]*?)\[\/PLAN\]/);
    window._ciExercises=(match?match[1].trim().split('\n').filter(l=>l.trim()).map(line=>{
      const p=line.split('|').map(s=>s.trim());

function toggleCiEx(i){
  if(!window._ciExercises) return;
  window._ciExercises[i].included=!window._ciExercises[i].included;
  renderCiPlan();
}

function addCiPreset(i){
  if(!window._ciExercises) window._ciExercises=[];
  const p=CI_PRESETS[i];
  if(!window._ciExercises.find(e=>e.name===p.name)){
    window._ciExercises.push({...p,included:true});
    renderCiPlan();
  } else { toast('е·ІеҠ е’—е‘ўеҖӢеӢ•дҪң'); }

function addCiCustom(){

let _cachedModel=null;

async function callAI(messages){
  if(!_cachedModel){
    const modelsRes=await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${groqKey}`);
    const modelsData=await modelsRes.json();
    if(!modelsRes.ok) throw new Error(modelsData.error?.message||`Auth error: HTTP ${modelsRes.status}`);
    const available=(modelsData.models||[]).filter(m=>m.supportedGenerationMethods?.includes('generateContent')).map(m=>m.name);
    if(!available.length) throw new Error('еҶҮеҸҜз”ЁжЁЎеһӢ');
    _cachedModel=available.find(m=>m.includes('flash'))||available.find(m=>m.includes('pro'))||available[0];
  }

  const sysMsg=messages.find(m=>m.role==='system')?.content||'';
  const convo=messages.filter(m=>m.role!=='system').map(m=>({
    role:m.role==='assistant'?'model':'user',
    parts:[{text:m.content}]
  }));
  const contents=sysMsg?[{role:'user',parts:[{text:sysMsg}]},{role:'model',parts:[{text:'жҳҺзҷҪпјҢжҲ‘жңғжҢүз…§дҪ еҳ…жҢҮзӨәе№«еҠ©дҪ гҖӮ'}]},...convo]:convo;
  const res=await fetch(`https://generativelanguage.googleapis.com/v1/${_cachedModel}:generateContent?key=${groqKey}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents,
      generationConfig:{maxOutputTokens:2048,temperature:0.7}
    })
  });
  const data=await res.json();
  if(!res.ok) throw new Error(data.error?.message||`HTTP ${res.status}`);
  const reply=data.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!reply) throw new Error('Empty response');
  const finishReason=data.candidates?.[0]?.finishReason;
  return {text:reply, truncated: finishReason==='MAX_TOKENS'};
}

  msgs.innerHTML+=`<div class="msg msg-ai" id="${typingId}"><div class="msg-typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  try{
    const contHistory=[...chatHistory,{role:'user',content:'и«Ӣз№јзәҢ'}];
    const result=await callAI([{role:'system',content:getSystemPrompt()},...contHistory]);
    const reply=result.text;
    chatHistory.push({role:'assistant',content:reply});
    document.getElementById(typingId)?.remove();
    appendMsg('ai', reply);

    appendMsg('ai',`йҖЈжҺҘеҮәзҸҫе•ҸйЎҢпјҡ${e.message}`);
  }
}

async function autoStartAI(prebuiltMsg){
  const todayIdx=(()=>{const m=[6,0,1,2,3,4,5];return m[new Date().getDay()]??0;})();
  const day=DAYS[todayIdx];
  const exList=day.sections.map(s=>`${s.label}: ${s.exercises.map(e=>e.name).join('гҖҒ')}`).join(' | ');
  const initMsg=prebuiltMsg||`гҖҗж–°иЁ“з·ҙж—Ҙ вҖ” ${day.name} ${day.title}гҖ‘\nеҺҹе®ҡеӢ•дҪңпјҡ${exList}\n\nи«ӢдҪ пјҡ1)з”Ё2-3еҸҘи©ұи¬ӣжҲ‘жңҖиҝ‘иЁ“з·ҙйҖІеәҰжңүе’©еҖјеҫ—з•ҷж„Ҹ 2)е•ҸжҲ‘д»Ҡж—Ҙиә«й«”зӢҖжіҒпјҲзІҫеҠӣ/и…°/иҶҠй ӯ/жҷӮй–“/еҷЁжқҗпјүпјҢзӯүжҲ‘еӣһзӯ”еҫҢеҶҚжҸҗеҮәд»Ҡж—ҘиЁҲеҠғгҖӮ`;

  msgs.innerHTML=`<div class="msg msg-ai" id="${typingId}"><div class="msg-typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  try{

    chatHistory=[{role:'user',content:initMsg},{role:'assistant',content:reply}];

    appendMsg('ai',reply);
    if(result.truncated) showContinueBtn();
    else checkForPlan(reply);

function checkForPlan(text){
  const match=text.match(/\[PLAN\]([\s\S]*?)\[\/PLAN\]/);
  if(!match) return;
  const exercises=match[1].trim().split('\n').filter(l=>l.trim()).map(line=>{
    const parts=line.split('|').map(s=>s.trim());
    return {name:parts[0]||'',sets:parts[1]||'',note:parts[2]||'',done:false};
  }).filter(e=>e.name && e.name!=='еӢ•дҪңеҗҚзЁұ' && !e.name.startsWith('---') && e.name!=='Exercise');
  if(!exercises.length) return;
  const wrap=document.getElementById('acceptWrap');
  if(!wrap) return;
  wrap.innerHTML=`<button class="gen-btn" style="width:100%;margin:8px 0" onclick="acceptAIPlan()">вң“ жҺҘеҸ—д»Ҡж—ҘиЁҲеҠғ вҖ” еүҚеҫҖ TRAIN й Ғй–Ӣе§ӢиЁ“з·ҙ</button>`;
  wrap._plan=exercises;
}

async function sendChat() {
  if(!groqKey){toast('и«Ӣе…ҲиЁӯе®ҡAPI Key');return;}
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if(!msg) return;
  input.value='';
  appendMsg('user',msg);

  // Typing indicator
  const typingId='typing_'+Date.now();
  const msgs=document.getElementById('chatMsgs');
  msgs.innerHTML+=`<div class="msg msg-ai" id="${typingId}"><div class="msg-typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;

  chatHistory.push({role:'user',content:msg});

  try {
    const result=await callAI([{role:'system',content:getSystemPrompt()},...chatHistory]);
    const reply=result.text;
    chatHistory.push({role:'assistant',content:reply});
    document.getElementById(typingId)?.remove();
    appendMsg('ai', reply);
    if(result.truncated) showContinueBtn();
    else checkForPlan(reply);
  } catch(e) {
    chatHistory.pop();
    document.getElementById(typingId)?.remove();
    appendMsg('ai',`йҖЈжҺҘеҮәзҸҫе•ҸйЎҢпјҡ${e.message||'и«ӢжӘўжҹҘAPI KeyжҲ–з¶ІзөЎйҖЈжҺҘгҖӮ'}`);
  }
}

function sendQuick(msg) {
  if(!groqKey){toast('и«Ӣе…ҲиЁӯе®ҡAPI Key');return;}
  const input=document.getElementById('chatInput');
  input.value=msg;
  sendChat();
}

function appendMsg(role,text) {
  const msgs=document.getElementById('chatMsgs');
  if(!msgs) return;
  const div=document.createElement('div');
  div.className=`msg ${role==='ai'?'msg-ai':'msg-user'}`;
  div.innerHTML=role==='ai'?`<strong>// ATLAS A.I.</strong>${text.replace(/\n/g,'<br>')}`:text;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function buildLogSummary() {
  const entries=Object.entries(logData).filter(([,v])=>v.done);
  if(!entries.length) return 'иЁ“з·ҙиЁҳйҢ„пјҡжҡ«жҷӮжңӘжңүиЁҳйҢ„';
  let summary='жңҖиҝ‘иЁ“з·ҙиЁҳйҢ„пјҲжңҖеӨҡ10жўқпјүпјҡ\n';
  entries.slice(-10).forEach(([k,v])=>{
    const setInfo=(v.sets||[]).filter(s=>s?.w||s?.r).map(s=>`${s.w||'?'}kgГ—${s.r||'?'}`).join(', ');
    const note=v.actualNote?`пјҲеҜҰйҡӣпјҡ${v.actualNote}пјү`:'';
    if(setInfo||note) summary+=`- ${k}${note}: ${setInfo||'е·Іе®ҢжҲҗ'}\n`;
  });
  return summary;
}

function buildSetLog(k, sets) {
  const match = sets.match(/^(\d+)/);
  const numSets = match ? parseInt(match[1]) : 3;
  const saved = logData[k]?.sets || [];
  const savedNote = logData[k]?.actualNote||'';
  let html = `<div style="margin-bottom:10px">
    <div style="font-family:Courier Prime,monospace;font-size:9px;letter-spacing:2px;color:var(--amber);margin-bottom:6px">// еҜҰйҡӣеӢ•дҪңпјҲеҰӮжңүжӣҝжҸӣи«ӢеЎ«еҜ«пјү</div>
    <input type="text" placeholder="дҫӢпјҡз”Ё Cable Row д»ЈжӣҝгҖҒз”Ё Smith Machine..." value="${savedNote}"
      style="width:100%;background:var(--bg3);border:1px solid var(--border2);padding:8px 10px;color:var(--cream);font-family:'Courier Prime',monospace;font-size:12px;outline:none;border-radius:2px;box-sizing:border-box"
      onchange="saveActualNote('${k}',this.value)">
  </div>`;
  html += '<div style="font-family:Courier Prime,monospace;font-size:9px;letter-spacing:2px;color:var(--amber);margin-bottom:10px">// жҜҸзө„иЁҳйҢ„</div>';
  html += '<div style="display:grid;grid-template-columns:repeat('+Math.min(numSets,4)+',1fr);gap:6px;margin-bottom:10px">';
  for (let i=0; i<numSets; i++) {
    const s = saved[i] || {};
    html += `<div style="background:var(--bg3);border:1px solid var(--border2);padding:8px 6px;text-align:center">
      <div style="font-size:8px;color:var(--dim);letter-spacing:1px;margin-bottom:4px">SET ${i+1}</div>
      <input type="number" placeholder="kg" value="${s.w||''}"
        style="width:100%;background:transparent;border:none;outline:none;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--amber);text-align:center"
        id="sw_${k}_${i}" onchange="saveSet('${k}',${i},'w',this.value)">
      <div style="height:1px;background:var(--border);margin:4px 0"></div>
      <input type="number" placeholder="reps" value="${s.r||''}"
        style="width:100%;background:transparent;border:none;outline:none;font-family:'Courier Prime',monospace;font-size:12px;color:var(--cream2);text-align:center"
        id="sr_${k}_${i}" onchange="saveSet('${k}',${i},'r',this.value)">
    </div>`;
  }
  html += '</div>';
  html += `<button onclick="markDone('${k}')" style="width:100%;background:var(--amber);border:none;padding:10px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--bg);cursor:pointer;box-shadow:2px 2px 0 var(--rust)">вҖ” MARK COMPLETE вҖ”</button>`;
  return html;
}

function saveActualNote(k, val) {
  if (!logData[k]) logData[k] = { done: false, sets: [] };
  logData[k].actualNote = val;
  saveLog();
}

function saveSet(k, i, field, val) {
  if (!logData[k]) logData[k] = { done: false, sets: [] };
  if (!logData[k].sets) logData[k].sets = [];
  if (!logData[k].sets[i]) logData[k].sets[i] = {};
  logData[k].sets[i][field] = val;
  saveLog();
}

function markDone(k) {
  if (!logData[k]) logData[k] = {};
  logData[k].done = true;
  saveLog();
  // Also mark AI plan exercise if applicable
  if(k.startsWith('aip_')){
    const i=parseInt(k.split('_').pop());
    if(aiPlan&&aiPlan[i]){
      aiPlan[i].done=true;
      ui['aip_open_'+i]=false;
      localStorage.setItem('atlas_ai_plan_'+_todayDateStr,JSON.stringify(aiPlan));
    }
  }
  toast('вң“ COMPLETE!');
  renderDayContent();
}

function buildAlts(name) {
  const alts = ALTS[name];
  if (!alts || !alts.length) return '<div style="font-size:12px;color:var(--dim);font-family:Courier Prime,monospace;padding:4px 0">е‘ўеҖӢеӢ•дҪңжҡ«жҷӮеҶҮиЁӯе®ҡжӣҝд»ЈеӢ•дҪң</div>';
  return '<div style="font-family:Courier Prime,monospace;font-size:9px;letter-spacing:2px;color:var(--amber);margin-bottom:12px">// жӣҝд»ЈеӢ•дҪңйҒёж“Ү</div>' +
    alts.map(a=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:6px;background:var(--bg3);border:1px solid var(--border);border-left:2px solid var(--amber)">
      <span style="font-size:13px;font-weight:600;color:var(--cream2)">${a}</span>
    </div>`).join('') +
    '<div style="font-size:11px;color:var(--dim);font-family:Courier Prime,monospace;margin-top:10px;line-height:1.6">еҷЁжқҗе””еӨ жҲ–еҸ—еӮ·жҷӮеҸҜз”Ёд»ҘдёҠжӣҝд»ЈеӢ•дҪңпјҢж•Ҳжһңзӣёиҝ‘гҖӮ</div>';
}
function toggleEx(k){ui[k]=!ui[k];if(ui[k]&&!ui[k+'_t'])ui[k+'_t']='tips';renderDayContent();}
function switchTab(k,t){ui[k+'_t']=t;renderDayContent();}
function toggleLog(ev,k){ev.stopPropagation();ui[k+'_l']=!ui[k+'_l'];renderDayContent();}
function loadYT(k,id){const w=document.getElementById('yw_'+k);if(w)w.innerHTML=`<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allowfullscreen allow="autoplay"></iframe>`;}
function saveExLog(k){
  const w=document.getElementById('w_'+k)?.value||'';
  const r=document.getElementById('r_'+k)?.value||'';
  logData[k]={done:true,weight:w,reps:r,ts:Date.now()};
  ui[k+'_l']=false; saveLog(); toast('вң“ RECORDED'); renderDayContent();
}

function buildWeightChart() {
  const entries = Object.entries(weightData).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14);
  if (!entries.length) return '<div style="font-size:12px;color:var(--dim);font-family:Courier Prime,monospace;text-align:center;padding:20px 0">жңӘжңүй«”йҮҚиЁҳйҢ„<br>е–әCheck-inеЎ«е…Ҙй«”йҮҚй–Ӣе§ӢиҝҪи№Ө</div>';
  const weights = entries.map(([,v])=>v.weight);
  const min = Math.min(...weights)-1, max = Math.max(...weights)+1;
  const range = max-min||1;
  const w = 100/entries.length;
  let bars = entries.map(([date,v],i)=>{
    const pct = ((v.weight-min)/range*80)+10;
    const d = date.slice(5);
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="font-family:'Playfair Display',serif;font-size:11px;font-weight:700;color:var(--amber)">${v.weight}</div>
      <div style="width:100%;height:50px;background:var(--bg3);display:flex;align-items:flex-end;overflow:hidden">
        <div style="width:100%;height:${pct}%;background:var(--amber);transition:height 0.6s ease"></div>
      </div>
      <div style="font-size:8px;color:var(--dim);font-family:'Courier Prime',monospace">${d}</div>
    </div>`;
  }).join('');
  const latest = weights[weights.length-1];
  const first = weights[0];
  const diff = (latest-first).toFixed(1);
  const diffColor = diff<=0?'#8fa840':'#c84820';
  return `<div style="display:flex;gap:4px;align-items:flex-end">${bars}</div>
    <div style="display:flex;justify-content:space-between;margin-top:10px;font-family:'Courier Prime',monospace;font-size:11px">
      <span style="color:var(--dim)">иҖҢе®¶пјҡ<span style="color:var(--amber);font-weight:700">${latest}kg</span></span>
      <span style="color:${diffColor}">${diff>0?'+':''}${diff}kg</span>
    </div>`;
}

      <div class="stat-card card-fly" style="animation-delay:0.1s"><div class="stat-icon" style="background:rgba(96,144,224,0.15);color:#6090e0"><svg viewBox="0 0 16 16" width="16" height="16"><rect x="2" y="3" width="12" height="11" rx="1" stroke="currentColor" fill="none" stroke-width="1.5"/><line x1="2" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="1" x2="5" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="11" y1="1" x2="11" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div><div class="stat-val">${daysDone}</div><div class="stat-lbl">иЁ“з·ҙж—Ҙж•ё</div></div>
      <div class="stat-card card-fly" style="animation-delay:0.15s"><div class="stat-icon" style="background:rgba(232,160,48,0.15);color:var(--amber)"><svg viewBox="0 0 16 16" width="16" height="16"><circle cx="8" cy="8" r="6" stroke="currentColor" fill="none" stroke-width="1.5"/><path d="M8 8 L8 2 A6 6 0 0 1 14 8 Z" fill="currentColor" opacity="0.7"/></svg></div><div class="stat-val">${Math.round(doneEx/totalEx*100)||0}%</div><div class="stat-lbl">ж•ҙй«”е®ҢжҲҗзҺҮ</div></div>
      <div class="stat-card card-fly" style="animation-delay:0.2s"><div class="stat-icon" style="background:rgba(200,72,32,0.15);color:var(--rust2)"><svg viewBox="0 0 16 16" width="16" height="16"><line x1="4" y1="2" x2="4" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4 2 L13 5 L4 9 Z" fill="currentColor"/></svg></div><div class="stat-val">P.1</div><div class="stat-lbl">з•¶еүҚйҡҺж®ө</div></div>
    </div>
    <div class="week-grid">${bars}</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:16px;margin-bottom:16px">
      <div style="font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:3px;color:var(--amber);margin-bottom:12px">// й«”йҮҚиЁҳйҢ„</div>
      ${buildWeightChart()}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="loadFromSheets()" style="flex:1;background:transparent;border:1px solid var(--border2);padding:8px;font-family:'Courier Prime',monospace;font-size:11px;color:var(--dim);cursor:pointer;letter-spacing:1px">в¬Ү еҫһGoogle SheetsжҒўеҫ©</button>
        <button onclick="syncToSheets()" style="flex:1;background:var(--amber);border:none;padding:8px;font-family:'Courier Prime',monospace;font-size:11px;color:var(--bg);font-weight:700;cursor:pointer;letter-spacing:1px">вҳҒ з«ӢеҚіеҗҢжӯҘ</button>
      </div>
      <div style="font-size:10px;color:var(--dim2);font-family:'Courier Prime',monospace;margin-top:8px;text-align:center">
        дёҠж¬ЎеҗҢжӯҘпјҡ${localStorage.getItem('atlas_last_sync')||'жңӘжӣҫеҗҢжӯҘ'}
      </div>
    </div>
    <div class="phase-card card-fly">
      <div class="phase-tag">// з•¶еүҚйҡҺж®ө В· PHASE ONE</div>

      <div class="phase-bar-labels"><span>й–Ӣе§Ӣ</span><span>Week 4</span></div>
      <div class="phase-bar"><div class="phase-fill" style="width:25%"></div></div>
    </div>
    <div class="phase-card card-fly" style="animation-delay:0.1s;opacity:0.6">
      <div class="phase-tag">// дёӢдёҖйҡҺж®ө В· PHASE TWO</div>
      <div class="phase-title">еј·еәҰжҸҗеҚҮ</div>
      <div class="phase-desc">Wk 5вҖ“8пјҡжјёйҖІи¶…иІ иҚ·пјҢзҲҶзҷјеҠӣPlyometricеҚҮзҙҡпјҢжүӢиҮӮе°Ҳй …еҠ еј·гҖӮ</div>
    </div>
    <div class="phase-card card-fly" style="animation-delay:0.15s;opacity:0.4">
      <div class="phase-tag">// жңҖзөӮйҡҺж®ө В· PHASE THREE</div>
      <div class="phase-title">еі°еҖјиЎЁзҸҫ</div>
      <div class="phase-desc">Wk 9вҖ“12пјҡйҒӢеӢ•е°Ҳй …ж•ҙеҗҲпјҢжңҖеӨ§зҲҶзҷјеҠӣпјҢжҺ’зҗғйҖІж”»жЁЎж“¬иЁ“з·ҙгҖӮ</div>
    </div>
  </div>`;
}
